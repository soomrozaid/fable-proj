name: content-publish

# Drafts the next queued post with an LLM, runs it through the quality gate, and
# publishes it (moves the markdown in, updates the registry, notifies search
# engines), then commits so Vercel deploys. Runs Mon/Wed/Fri; also on demand.
#
# Turn it on with ONE master switch (a deliberate on/off for autopublish):
#   repo VARIABLE  CONTENT_PIPELINE = true
# plus repo SECRETS:
#   ANTHROPIC_API_KEY  (or AI_GATEWAY_API_KEY)   — required to draft
#   GCP_SA_KEY          — the Search Console service-account JSON (for indexing)
# While CONTENT_PIPELINE is unset, scheduled runs no-op (no noise).
#
# Autonomy (default is the safe one):
#   - By default this opens a PR you review + merge (Vercel deploys on merge).
#   - Set variable CONTENT_AUTOPUBLISH = true to commit straight to main instead
#     (fully hands-off; still gated by the quality lint). Recommended: run in PR
#     mode for ~2 weeks, then flip to autopublish once you trust the output.

on:
  schedule:
    - cron: "0 14 * * 1,3,5"
  workflow_dispatch:
    inputs:
      slug:
        description: "Specific queue slug to draft + publish (optional)"
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: content
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ vars.CONTENT_PIPELINE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci

      - name: Write Search Console key (if provided)
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Draft next post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          SLUG: ${{ github.event.inputs.slug }}
        run: |
          if [ -n "$SLUG" ]; then
            node scripts/content/draft.mjs --slug "$SLUG"
          else
            node scripts/content/draft.mjs --count 1
          fi

      - name: Publish (quality gate + registry; notify only when autopublishing)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          AUTOPUBLISH: ${{ vars.CONTENT_AUTOPUBLISH }}
        run: |
          if [ "$AUTOPUBLISH" = "true" ]; then
            node scripts/content/publish.mjs --all
          else
            node scripts/content/publish.mjs --all --no-notify
          fi

      - name: Ship (autopublish to main, or open a review PR)
        env:
          GH_TOKEN: ${{ github.token }}
          AUTOPUBLISH: ${{ vars.CONTENT_AUTOPUBLISH }}
        run: |
          if [ -z "$(git status --porcelain content/)" ]; then
            echo "nothing new to publish"; exit 0
          fi
          git config user.name "scanstone-bot"
          git config user.email "bot@scanstone.ca"
          if [ "$AUTOPUBLISH" = "true" ]; then
            git add -A content/
            git commit -m "content: publish scheduled post [skip ci]"
            git push
          else
            BRANCH="content/auto-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add -A content/
            git commit -m "content: new post ready for review"
            git push -u origin "$BRANCH"
            gh pr create --base main --head "$BRANCH" \
              --title "Content: new post ready for review" \
              --body "Auto-drafted and passed the quality gate. Review and merge to publish — Vercel deploys on merge."
          fi
